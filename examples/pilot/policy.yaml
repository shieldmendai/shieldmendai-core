schema_version: "1.0"
pilot_id: shieldmendai-local-pilot
enabled: true
local_only: true
read_only: true
sandbox_only: true
allowed_host_reference: local-sandbox
allowed_target_ids:
  - fixture-service
  - fixture-process
  - fixture-json
  - fixture-executable
  - fixture-disabled
allowed_adapter_types:
  - systemd_service
  - process
  - json_file
  - executable_check
  - file
prohibited_adapter_types:
  - http
  - tcp
repairs_enabled: false
notifications_enabled: false
network_enabled: false
process_enumeration_enabled: false
systemd_enabled: false
maximum_targets: 5
minimum_interval_seconds: 60
incident_store_reference: var/lib/shieldmendai/incidents
review_required: true
