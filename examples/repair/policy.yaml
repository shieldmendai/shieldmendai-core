policy:
  id: phase4-low-risk
  mode: require_approval
  allowed_target_ids:
    - fictional-api-service
  allowed_adapter_types:
    - systemd_service
  allowed_actions:
    - restart_allowlisted_service
  allowed_target_actions:
    - target_id: fictional-api-service
      action: restart_allowlisted_service
  maximum_risk: low
  allowed_finding_categories:
    - service_failed
  minimum_severity: medium
  maximum_severity: critical
  minimum_confidence: high
  retry_limit: 1
  cooldown_seconds: 300
  verification_delay_seconds: 15
  require_pre_repair_evidence: true
  require_verification: true
  rollback_on_verification_failure: true
