global:
  schema_version: "1.0"
  installation_name: phase4-repair-example
  application_name: Fictional Repair Portfolio
  environment: simulation
  dry_run: true
  poll_interval_seconds: 60
  incident_directory: /var/lib/shieldmendai/incidents
  log_level: INFO
  default_policy_mode: require_approval
  default_retry_limit: 1
  default_cooldown_seconds: 300
  default_verification_delay_seconds: 15

repair_policies:
  - id: phase4-low-risk
    mode: require_approval
    allowed_actions: [restart_allowlisted_service]

notification_channels: []
notification_policies: []

targets:
  - id: fictional-api-service
    display_name: Fictional API Service
    adapter_type: systemd_service
    enabled: true
    severity: high
    monitoring:
      unit: fictional-api.service
      expected_state: active
    repair_policy: phase4-low-risk
  - id: fictional-config-file
    display_name: Fictional Configuration Fixture
    adapter_type: file
    enabled: true
    severity: medium
    monitoring:
      path: fictional-config.yaml
      required: true
    repair_policy: phase4-low-risk
  - id: fictional-deployment
    display_name: Fictional Deployment
    adapter_type: plugin
    enabled: true
    severity: high
    monitoring:
      deployment_reference: fictional-release
    repair_policy: phase4-low-risk
