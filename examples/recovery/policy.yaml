policy:
  schema_version: "1.0"
  id: fictional-recovery-policy
  retry:
    maximum_repair_attempts: 3
    maximum_verification_attempts: 3
    maximum_rollback_attempts: 2
    retryable_outcomes: [failed, timed_out]
    nonretryable_outcomes: [unsupported, prohibited]
    reset_after_success: true
    retry_window_seconds: 3600
    count_attempts_per_target: true
    count_attempts_per_incident: true
  cooldown:
    cooldown_seconds: 0
    cooldown_starts_after: verification_failed
    cooldown_scope: per_target_action
    bypass_allowed: false
  backoff:
    strategy: bounded_exponential
    initial_delay_seconds: 0
    multiplier: 2
    maximum_delay_seconds: 300
    jitter_enabled: false
  circuit_breaker:
    failure_threshold: 3
    failure_window_seconds: 3600
    open_duration_seconds: 300
    half_open_max_attempts: 1
    reset_after_success: true
    count_verification_failures: true
    count_rollback_failures: true
    count_authorization_denials: false
  verification:
    required: true
    rollback_on_failure: true
    manual_intervention_on_inconclusive: true
    require_complete_evidence: true
    require_adapter_compatibility: true
  rollback:
    enabled: true
    require_known_good_reference: false
    require_valid_approval: true
    permitted_risks: [informational, low, medium]
