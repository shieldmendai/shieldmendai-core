schema_version: "1.0"
simulation_only: true
scenarios:
  - first simulated repair verifies successfully
  - verification fails and one retry succeeds
  - repeated verification failure exhausts retry budget
  - fixed backoff schedules the next attempt
  - linear backoff increases delays
  - exponential backoff increases delays and respects its bound
  - attempt during cooldown is denied
  - circuit remains closed below threshold
  - circuit opens at threshold
  - open circuit denies another attempt
  - circuit enters half_open after its deterministic reset time
  - successful half-open verification closes the circuit
  - failed half-open verification reopens the circuit
  - duplicate plan execution is rejected
  - duplicate request and action replay is rejected
  - verification failure triggers simulated rollback
  - simulated rollback success requires post-rollback verification
  - simulated rollback failure consumes a bounded retry
  - rollback retry budget is exhausted
  - manual intervention is required
  - missing verification fails closed
  - inconclusive verification does not resolve the incident
  - unknown state transition is rejected
  - invalid timestamp is rejected
  - code-patch action remains prohibited
  - controller state serializes and reloads safely
  - credential-like state is rejected
